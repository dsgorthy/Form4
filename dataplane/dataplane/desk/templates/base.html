<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Pyrrho · Dataplane Desk{% endblock %}</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #181c22;
    --border: #1f242c;
    --fg: #d7dade;
    --dim: #8b9098;
    --accent: #5260ff;
    --green: #2dd36f;
    --yellow: #ffc409;
    --red: #eb445a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; line-height: 1.45;
  }
  a { color: var(--fg); text-decoration: none; border-bottom: 1px dotted var(--dim); }
  a:hover { border-bottom-color: var(--fg); }
  nav.top {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 10px 18px; display: flex; gap: 22px; align-items: center;
    position: sticky; top: 0; z-index: 5;
  }
  nav.top .brand { font-weight: 500; letter-spacing: 0.5px; border: none; }
  nav.top a { border: none; color: var(--dim); }
  nav.top a.on, nav.top a:hover { color: var(--fg); }
  nav.top form { margin-left: auto; }
  nav.top input[type=text] {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    padding: 4px 10px; font: inherit; width: 180px; outline: none;
    border-radius: 2px;
  }
  nav.top input[type=text]:focus { border-color: var(--accent); }
  main { padding: 18px 22px; max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 14px; font-weight: 500; margin: 0 0 4px; }
  h2 {
    font-size: 11px; text-transform: uppercase; color: var(--dim);
    letter-spacing: 1.2px; margin: 18px 0 8px; font-weight: 500;
  }
  .sub { color: var(--dim); font-size: 12px; margin-bottom: 16px; }
  section, .card {
    background: var(--panel); border: 1px solid var(--border);
    padding: 12px 14px; margin-bottom: 14px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 5px 10px; text-align: left; vertical-align: top; }
  th {
    color: var(--dim); font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.dim { color: var(--dim); }
  tr:hover { background: var(--panel-2); }
  .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; vertical-align: 0;
  }
  .dot.green  { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red    { background: var(--red); }
  .dot.unknown { background: var(--dim); }
  .badge {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 11px; color: var(--dim); background: var(--panel-2);
    border: 1px solid var(--border);
  }
  pre, code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
  }
  pre {
    background: var(--bg); border: 1px solid var(--border);
    padding: 10px 12px; overflow-x: auto; color: var(--fg);
    border-radius: 2px; white-space: pre-wrap; word-break: break-word;
  }
  .kv { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: 12px; }
  .kv .k { color: var(--dim); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
  .summary {
    display: flex; gap: 28px; flex-wrap: wrap; font-size: 13px;
  }
  .summary span { color: var(--dim); }
  .summary span b { color: var(--fg); font-weight: 500; }
  .filters {
    display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .filters input, .filters select {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    padding: 4px 8px; font: inherit; outline: none; border-radius: 2px;
  }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters label { color: var(--dim); font-size: 12px; }
  .foot { color: var(--dim); font-size: 11px; margin: 24px 0 12px; }
  .pill {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 11px; background: var(--panel-2);
  }
  .pill.green { color: var(--green); }
  .pill.red   { color: var(--red); }
  .pill.dim   { color: var(--dim); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="top">
  <span class="brand">Pyrrho · Dataplane Desk</span>
  <a href="/" class="{% if active=='home' %}on{% endif %}">Home</a>
  <a href="/signals" class="{% if active=='signals' %}on{% endif %}">Signals</a>
  <a href="/strategies" class="{% if active=='strategies' %}on{% endif %}">Strategies</a>
  <a href="/pipelines" class="{% if active=='pipelines' %}on{% endif %}">Pipelines</a>
  <a href="/new/strategy" class="{% if active=='new' %}on{% endif %}">+ New Strategy</a>
  <form action="/ticker" method="get">
    <input type="text" name="symbol" placeholder="ticker (e.g. NVDA)" autocomplete="off">
  </form>
</nav>
<main>
{% block main %}{% endblock %}
<div class="foot">tailnet · 100.78.9.66:3031 · same store as <code>python -m dataplane status</code></div>
</main>
</body>
</html>
