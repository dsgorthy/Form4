strategy:
  name: "etf_gap_fill"
  version: "1.0.0"
  description: >
    XLU gap fill — sweep-optimised (80.2% WR, Sharpe 1.12, ~14 trades/yr).
    Full gap range (0.05–0.30%), tight stop (0.20%).
    Utilities show strong mean-reversion — low-beta sector.

data:
  primary_symbol: "XLU"
  symbols: ["XLU", "VIXY"]
  timeframes: ["1Min"]
  lookback_days: 1

entry:
  time: "10:00"
  min_gap_pct: 0.05
  max_gap_pct: 0.30
  require_f30_fade: true

exit:
  time_stop: "15:30"
  stop_pct: 0.20
  max_hold_days: 3

filters:
  min_vixy: 0.0
  max_vixy: 80.0

instrument:
  type: "leveraged"
  leverage: 3.0

risk:
  position_size_pct: 5.0
  starting_capital: 30000
