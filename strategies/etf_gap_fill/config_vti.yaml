strategy:
  name: "etf_gap_fill"
  version: "2.0.0"
  description: >
    VTI gap fill — sweep-optimised (82.5% WR, Sharpe 1.64, ~20 trades/yr).
    Small-to-medium gaps (0.05–0.25%), tight stop (0.15%).
    Strongest non-SPY symbol: consistent edge across all gap ranges.

data:
  primary_symbol: "VTI"
  symbols: ["VTI", "VIXY"]
  timeframes: ["1Min"]
  lookback_days: 1

entry:
  time: "10:00"
  min_gap_pct: 0.05
  max_gap_pct: 0.25
  require_f30_fade: true

exit:
  time_stop: "15:30"
  stop_pct: 0.15
  max_hold_days: 3

filters:
  min_vixy: 0.0
  max_vixy: 80.0

instrument:
  type: "leveraged"
  leverage: 3.0

risk:
  position_size_pct: 5.0
  starting_capital: 30000
