strategy:
  name: "etf_gap_fill"
  version: "2.0.0"
  description: >
    DIA gap fill — sweep-optimised (81.3% WR, Sharpe 0.45, ~18 trades/yr).
    Small-to-medium gaps (0.05–0.25%), stop 0.20%.

data:
  primary_symbol: "DIA"
  symbols: ["DIA", "VIXY"]
  timeframes: ["1Min"]
  lookback_days: 1

entry:
  time: "10:00"
  min_gap_pct: 0.05
  max_gap_pct: 0.25
  require_f30_fade: true

exit:
  time_stop: "15:30"
  stop_pct: 0.20
  max_hold_days: 3

filters:
  min_vixy: 0.0
  max_vixy: 80.0

instrument:
  type: "leveraged"
  leverage: 3.0

risk:
  position_size_pct: 5.0
  starting_capital: 30000
