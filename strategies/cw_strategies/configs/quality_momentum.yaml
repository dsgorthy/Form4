strategy_name: quality_momentum
display_name: "Form4 Quality + Momentum"
telegram_prefix: "[QM]"
# Dedicated paper account — reads ALPACA_API_KEY_QUALITY_MOMENTUM / _SECRET_QUALITY_MOMENTUM from .env
alpaca_env_prefix: QUALITY_MOMENTUM
starting_capital: 100000
position_size_pct: 0.10
max_concurrent: 10
filing_lookback_days: 2

# Validated thesis: A+/A PIT-graded insiders buying in uptrend
# Signal compounds over time — genuine information advantage in favorable setup
#
# Grid search results (2020-2026):
#   10%/10pos/skip/30d: Sharpe 1.18, CAGR 18.5%, MaxDD 10.1%, 137 trades
#   Sub-period: H1 Sharpe 1.08, H2 Sharpe 1.19 (stable across regimes)
#   Only losing year: 2022 (-4.1% CAGR)
#
# Entry pricing: 5-min bar for market-hours filings, T+1 open for after-hours
# Overlap: ZERO with reversal_dip or 10b5_1_surprise (fully independent)
# Universe: ~50 trades/yr at A+/A filter

soft_cap: 10
min_conviction: 1.5
min_conviction_above_soft: 7.0
min_conviction_at_hard: 7.0

filters:
  pit_grade: ["A+", "A"]
  above_sma50: 1
  above_sma200: 1
  exclude_recurring: true
  exclude_tax_sales: true

exit:
  strategy: fixed_hold
  hold_days: 42  # Full backtest (2026-04-09): 42td Sharpe 0.49 (ann 1.20), 68.7% WR, +15.5% mean. Peak at ~60 calendar days.
  stop_loss_pct: null  # Grid search validated: stops degrade Sharpe by 25% (1.44 → 1.08). Quality picks recover from dips.

at_capacity: skip

circuit_breaker_dd_pct: 0.15
