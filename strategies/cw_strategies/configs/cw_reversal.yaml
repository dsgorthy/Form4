strategy_name: cw_reversal
display_name: "Form4 Reversal"
telegram_prefix: "[REV]"
starting_capital: 100000
position_size_pct: 0.33
max_concurrent: 3
filing_lookback_days: 2

# mc5/3pos/33%/skip — capacity-enforced, 5-min entry, PIT-verified
# 28.1% CAGR, 1.14 Sharpe, 23.5% MaxDD, 65 trades (2020-2026)
soft_cap: 3
min_conviction: 5.0
min_conviction_above_soft: 5.0
min_conviction_at_hard: 5.0

filters:
  is_rare_reversal: 1
  min_consecutive_sells: 5
  exclude_recurring: true
  exclude_tax_sales: true
  exclude_routine: true

exit:
  strategy: fixed_hold
  hold_days: 30
  stop_loss_pct: -0.15

at_capacity: skip

circuit_breaker_dd_pct: 0.10
