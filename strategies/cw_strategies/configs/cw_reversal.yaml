strategy_name: cw_reversal
display_name: "Form4 Reversal"
telegram_prefix: "[REV]"
starting_capital: 248000
position_size_pct: 0.167
max_concurrent: 6
filing_lookback_days: 2

# Soft cap 5 (83%) / Hard cap 6 (100%)
# Below 5: take any trade with conviction >= 5
# 5-6: only take conviction >= 7 (high quality)
# At 6: replace weakest if incoming conviction >= 7.5 AND has 1.5+ advantage
soft_cap: 5
min_conviction: 5.0
min_conviction_above_soft: 7.0
min_conviction_at_hard: 7.5

# Signal filters
filters:
  is_rare_reversal: 1
  min_consecutive_sells: 5
  exclude_recurring: true
  exclude_tax_sales: true
  exclude_routine: true

# Exit: 30-day hold with -15% hard stop
exit:
  strategy: fixed_hold
  hold_days: 30
  stop_loss_pct: -0.15

# At hard cap (6 positions): replace weakest conviction if incoming has 1.5+ advantage
at_capacity: replace_weakest
replacement_advantage: 1.5

circuit_breaker_dd_pct: 0.10
