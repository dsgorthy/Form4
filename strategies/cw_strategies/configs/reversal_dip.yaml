strategy_name: reversal_dip
display_name: "Form4 Deep Reversal"
alert_prefix: "[RDip]"
# Dedicated paper account — reads ALPACA_API_KEY_REVERSAL_DIP / _SECRET_REVERSAL_DIP from .env
alpaca_env_prefix: REVERSAL_DIP
starting_capital: 100000
position_size_pct: 0.10
max_concurrent: 10
filing_lookback_days: 2

# Decision sink: 'paper' | 'live' | 'alert_only'.
# alert_only — see quality_momentum.yaml for full semantics.
execution_mode: alert_only

# Validated thesis: persistent seller (10+ consecutive sells) reverses into a deep dip
# Mean-reversion play — stock is depressed, insider who was selling suddenly buys
#
# CRITICAL: Do NOT add momentum/SMA filters. This is a contrarian strategy.
#   Momentum filter flips sign across regimes (helped 2020, hurt 2023+).
#   The dip requirement IS the edge stabilizer.
#
# Refined grid search results (2020-2026):
#   10%/10pos/skip/21d/csb10/dip-0.25: Sharpe 1.08, CAGR 11.3%, MaxDD 14.3%, 132 trades
#   Sub-period: H1 Sharpe 0.62, H2 Sharpe 1.64 (positive in all periods)
#   Positive in 2020 (1.13), 2022 (0.44), 2023 (2.55), 2025 (0.94)
#
# Entry pricing: 5-min bar for market-hours filings, T+1 open for after-hours
# Overlap: ZERO with quality_momentum. 3.3% with 10b5_1_surprise.
# Universe: ~20 trades/yr

soft_cap: 10
min_conviction: 3.0
min_conviction_above_soft: 4.5
min_conviction_at_hard: 3.0   # was 7.0 — lowered to enable rotation (see at_capacity below)

filters:
  is_rare_reversal: 1
  min_consecutive_sells: 10
  min_dip_3mo: -0.25  # 3-month price decline of 25%+
  exclude_recurring: true
  exclude_tax_sales: true
  exclude_routine: true  # cohen_routine = 0
  exclude_10b5_1: true   # separate 10b5-1 strategy handles those

exit:
  strategy: fixed_hold
  hold_days: 21  # mean reversion — take profit quickly, edge vanishes at 90d
  stop_loss_pct: null  # Grid search validated: stops degrade Sharpe by 18% (1.27 → 1.04). Short hold limits downside.

# Rotation — when at max_concurrent and a higher-conviction signal arrives,
# close the weakest held position and enter the new one. Backtest evidence
# (rd_swap_test.py, 2026-05-12): SKIP baseline +$98,563 vs ROTATE +$111,740
# over 145 candidates 2020-2026 (~+$2.1K/yr alpha, ~1.6 swaps/yr).
# replacement_advantage=0.5 prevents thrashing on tied/near-tied conviction.
at_capacity: replace_weakest
replacement_advantage: 0.5

circuit_breaker_dd_pct: 0.15

# Hard guardrails — see quality_momentum.yaml for rationale. Reversal trades
# tend to be in beaten-down stocks so min_price floor is intentionally low.
guardrails:
  min_dollar_amount: 100.0
  max_dollar_amount: 25_000.0
  min_qty: 1
  max_qty: 10_000
  min_price: 0.50
  max_price: 5_000.0
  max_daily_buys: 10
  max_daily_sells: 20
