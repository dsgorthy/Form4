strategy_name: cw_composite
display_name: "Form4 Composite"
telegram_prefix: "[COMP]"
starting_capital: 100000
position_size_pct: 0.10
max_concurrent: 6
filing_lookback_days: 2

# mc5/6pos/10%/replace_oldest — capacity-enforced, PIT-verified
# 11.2% CAGR, 0.55 Sharpe, 26.7% MaxDD, 226 trades (2020-2026)
soft_cap: 6
min_conviction: 5.0
min_conviction_above_soft: 5.0
min_conviction_at_hard: 5.0

at_capacity: replace_oldest

filters:
  exclude_recurring: true
  exclude_tax_sales: true
  exclude_routine: true

theses:
  - name: reversal
    filters:
      is_rare_reversal: 1
      min_consecutive_sells: 5
    exit:
      strategy: fixed_hold
      hold_days: 30
      stop_loss_pct: -0.15

  - name: dip_cluster
    filters:
      max_dip_1mo: -0.15
      require_pit_cluster: true
      min_pit_cluster_size: 2
    exit:
      strategy: trailing_stop
      hold_days: 30
      stop_pct: 0.15

  - name: momentum_largest
    filters:
      above_sma50: 1
      above_sma200: 1
      is_largest_ever: 1
    exit:
      strategy: trailing_stop
      hold_days: 30
      stop_pct: 0.15

circuit_breaker_dd_pct: 0.10
