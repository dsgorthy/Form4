strategy_name: quality_momentum_live
display_name: "Form4 Quality + Momentum (LIVE)"
alert_prefix: "[QM-LIVE]"
# strategy_name distinct from the paper variant (`quality_momentum`) so:
#   - strategy_portfolio.strategy / order_audit.strategy cleanly separate
#     paper vs live entries (no need for is_live JOIN to disambiguate)
#   - state file (`{strategy}_state.json`) and heartbeat file don't collide
#     when paper + live runners coexist on Studio
#   - WebSocket listener's ACCOUNTS[name=quality_momentum_live] queries
#     align with the matching strategy_portfolio rows
# Pre-2026-05-17 this read `quality_momentum`; the collision was caught by
# Phase 2 P2.5 of the data-flow audit before live money launched.
# Real-money Alpaca account — reads ALPACA_API_KEY_QUALITY_MOMENTUM_LIVE /
# _SECRET_QUALITY_MOMENTUM_LIVE from .env. The live_money flag also routes
# orders to api.alpaca.markets instead of paper-api.alpaca.markets.
alpaca_env_prefix: QUALITY_MOMENTUM
live_money: true

# Real-money sizing — $10k initial deposit. Position sizing is identical to
# paper (10%) but max_concurrent is halved to 5 so each open position is
# ~$1k of risk capital. circuit_breaker tightened from 15% to 10% for live.
starting_capital: 10000
position_size_pct: 0.10
max_concurrent: 5
filing_lookback_days: 2

# Same thesis as paper QM (validated A+/A insiders buying in uptrend), same
# 42-trading-day hold. Paper continues to run independently as the control
# arm; reconciler tracks both via is_live column.

soft_cap: 5
min_conviction: 1.5
min_conviction_above_soft: 7.0
min_conviction_at_hard: 7.0

filters:
  # Career Grade (V3) — see quality_momentum.yaml for backtest rationale.
  career_grade: ["A+", "A"]
  above_sma50: 1
  above_sma200: 1
  exclude_recurring: true
  exclude_tax_sales: true

exit:
  strategy: fixed_hold
  hold_days: 42
  stop_loss_pct: null

at_capacity: skip

# Tightened from 15% paper → 10% live. Real money doesn't get to ride a
# steeper drawdown looking for recovery.
circuit_breaker_dd_pct: 0.10

# Hard guardrails — narrower than paper defaults. The biggest single trade
# we'd ever want at $10k portfolio is $2k (20% concentration); $5k is the
# hard backstop in case sizing math goes wrong.
guardrails:
  min_dollar_amount: 100.0
  max_dollar_amount: 5_000.0
  min_qty: 1
  max_qty: 5_000
  min_price: 1.00
  max_price: 5_000.0
  max_daily_buys: 5
  max_daily_sells: 10
