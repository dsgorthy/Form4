strategy:
  name: "spy_gap_fill"
  version: "1.1.0"
  description: >
    SPY gap fill: small gaps only (0.05–0.15%). Targets highest fill-rate tier.
    Empirical fill rate for this range: 81.8–85.9% with F30 fade.

data:
  primary_symbol: "SPY"
  symbols: ["SPY", "VIXY"]
  timeframes: ["1Min"]
  lookback_days: 1

entry:
  time: "10:00"
  min_gap_pct: 0.05
  max_gap_pct: 0.15                # Small gaps only — highest fill rate tier
  require_f30_fade: true

exit:
  time_stop: "15:30"
  stop_pct: 0.25
  max_hold_days: 3

filters:
  min_vixy: 0.0
  max_vixy: 80.0

risk:
  position_size_pct: 3.0
  starting_capital: 30000
