strategy:
  name: "spy_gap_fill"
  version: "1.1.0"
  description: >
    QQQ gap fill: synthetic 3x leveraged exposure on QQQ.
    Same mean-reversion edge as SPY — small gaps (0.05–0.30%) with F30 fade.
    5% position sizing vs 3% SPY baseline; max 45% effective exposure across all 3
    symbols only when all trigger simultaneously (empirical P ≈ 0.06%).

data:
  primary_symbol: "QQQ"
  symbols: ["QQQ", "VIXY"]
  timeframes: ["1Min"]
  lookback_days: 1

entry:
  time: "10:00"
  min_gap_pct: 0.15              # Sweep best: small QQQ gaps (0.05-0.10%) are noise
  max_gap_pct: 0.40              # Wider ceiling; QQQ at ~$490 needs broader range
  require_f30_fade: true

exit:
  time_stop: "15:30"
  stop_pct: 0.15                 # Tighter stop: Sharpe 0.57 vs 0.08 at 0.25%
  max_hold_days: 3

filters:
  min_vixy: 0.0
  max_vixy: 80.0

instrument:
  type: "leveraged"
  leverage: 3.0

risk:
  position_size_pct: 5.0
  starting_capital: 30000
