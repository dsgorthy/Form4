strategy:
  name: "spy_gap_fill"
  version: "1.1.0"
  description: >
    SPY gap fill: full gap range (0.05–0.30%) with synthetic 3x leverage.
    3x magnifies P&L while using SPY as the underlying data source.
    Breakeven WR significantly lower than equity (leverage amplifies wins equally with losses).

data:
  primary_symbol: "SPY"
  symbols: ["SPY", "VIXY"]
  timeframes: ["1Min"]
  lookback_days: 1

entry:
  time: "10:00"
  min_gap_pct: 0.05
  max_gap_pct: 0.30
  require_f30_fade: true

exit:
  time_stop: "15:30"
  stop_pct: 0.25
  max_hold_days: 3

filters:
  min_vixy: 0.0
  max_vixy: 80.0

instrument:
  type: "leveraged"
  leverage: 3.0

risk:
  position_size_pct: 5.0
  starting_capital: 30000
