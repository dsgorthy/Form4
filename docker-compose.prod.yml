# Production overrides: restart policies, Caddy reverse proxy, log rotation
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://form4.app}
      - INSIDERS_DB_PATH=/data/insiders/insiders.db
      - NOTIFICATIONS_DB_PATH=/data/notifications/notifications.db
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: unless-stopped
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - api
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
