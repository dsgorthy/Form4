name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r api/requirements.txt
          pip install httpx stripe "PyJWT[crypto]" pydantic python-dotenv resend
          pip install ruff pytest

      - name: Lint (ruff — critical errors only, tighten over time)
        run: ruff check api/ --select E9,F63,F7,F82

      - name: Test
        run: pytest tests/unit -x -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://form4.app/api/v1
          NEXT_PUBLIC_BASE_URL: https://form4.app
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PRICE_ID: placeholder
          NEXT_PUBLIC_STRIPE_PRO_YEARLY_PRICE_ID: placeholder
          NEXT_PUBLIC_STRIPE_API_MONTHLY_PRICE_ID: placeholder

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t form4-api .

      - name: Build frontend image
        run: docker build -f deploy/Dockerfile.frontend -t form4-frontend .
