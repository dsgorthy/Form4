name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r api/requirements.txt
          pip install httpx stripe "PyJWT[crypto]" pydantic python-dotenv resend slowapi
          pip install ruff pytest

      - name: Lint (ruff — critical errors only, tighten over time)
        run: ruff check api/ --select E9,F63,F7,F82

      - name: Test
        run: PYTHONPATH="${{ github.workspace }}" pytest tests/unit -x -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://form4.app/api/v1
          NEXT_PUBLIC_BASE_URL: https://form4.app
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PRICE_ID: placeholder
          NEXT_PUBLIC_STRIPE_PRO_YEARLY_PRICE_ID: placeholder
          NEXT_PUBLIC_STRIPE_API_MONTHLY_PRICE_ID: placeholder

  deploy-sandbox:
    name: Deploy to sandbox
    runs-on: self-hosted
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    env:
      DOCKER_CONFIG: /Users/openclaw/trading-framework/actions-runner/.docker-ci
    steps:
      - uses: actions/checkout@v4

      - name: Ensure clean Docker config
        run: mkdir -p "$DOCKER_CONFIG" && echo '{"auths":{}}' > "$DOCKER_CONFIG/config.json"

      - name: Pull latest and deploy sandbox
        run: cd /Users/openclaw/trading-framework && git pull origin staging && ./deploy/deploy.sh --env sandbox

  deploy-prod:
    name: Deploy to production
    runs-on: self-hosted
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_CONFIG: /Users/openclaw/trading-framework/actions-runner/.docker-ci
    steps:
      - uses: actions/checkout@v4

      - name: Ensure clean Docker config
        run: mkdir -p "$DOCKER_CONFIG" && echo '{"auths":{}}' > "$DOCKER_CONFIG/config.json"

      - name: Pull latest and deploy production
        run: cd /Users/openclaw/trading-framework && git pull origin main && ./deploy/deploy.sh --env prod
