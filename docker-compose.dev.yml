# Dev overrides: hot reload, ports exposed to host, no Caddy
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  api:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api:/app/api
      - ./framework:/app/framework
      - ./strategies/insider_catalog:/data/insiders:ro
      - ./api:/data/notifications
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - INSIDERS_DB_PATH=/data/insiders/insiders.db
      - NOTIFICATIONS_DB_PATH=/data/notifications/notifications.db

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      target: deps
    command: npm run dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

volumes:
  frontend_node_modules:
