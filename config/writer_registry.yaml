# ─────────────────────────────────────────────────────────────────────────────
# Raw ingest — strategies/insider_catalog/fetch_latest.py
# insider-fetch plist, every 5 min.
# Writes signal_freshness ONLY on n_rows>0 inserts; the 48h SLA covers
# quiet weekends where every 5-min run inserts 0 rows.
# ─────────────────────────────────────────────────────────────────────────────

  - column: trades.filing_date
    script: strategies/insider_catalog/fetch_latest.py
    plists: [com.openclaw.insider-fetch]
    schedule: "every 5 min"
    sla_hours: 48
    required_for: ['*']
    notes: "Proxy for ingest freshness. write_freshness only fires on non-zero inserts."

  - column: trades.is_10b5_1
    script: strategies/insider_catalog/fetch_latest.py
    plists: [com.openclaw.insider-fetch]
    schedule: "every 5 min (XML parse-time)"
    sla_hours: 48
    required_for: []   # informational; staleness piggybacks on trades.filing_date
    recompute: false   # set at INSERT, never re-stamped
    notes: "Parse-time field from Form 4 XML — set at INSERT time, never recomputed. Strategies still read it; freshness piggybacks on trades.filing_date contract. The 2026-05-17 audit removed this from freshness_contracts.yaml because no canonical write_freshness writer exists, but kept the registry entry for documentation (strategies depend on the column being correctly set at parse time)."

