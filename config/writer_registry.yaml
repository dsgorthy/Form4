# Writer Registry — single source of truth for "which script writes which
# column on which schedule." Augments `freshness_contracts.yaml`:
#
#   - freshness_contracts.yaml answers: how fresh must X be, who needs it?
#   - writer_registry.yaml      answers: who writes X, on what cron?
#
# Verified at multiple layers:
#
#   1. Preflight (CI / pre-deploy): scripts/preflight/writer_registry_audit.py
#      AST-checks that the declared `script` actually contains a
#      `write_freshness(column=...)` call for the declared column. Cross-checks
#      that the declared plist's ProgramArguments references the script.
#
#   2. Runtime (cw_runner.scan_signals preflight): assert_writer_wired(column)
#      verifies the most-recent signal_freshness row for `column` was
#      `populated_by` the registered script, not some other script that
#      happens to also call write_freshness(column=X) (the mislabel that
#      hid the is_rare_reversal silence for 8 weeks).
#
# When you add, remove, rename, or move a column's writer: update this file
# in the same PR. The preflight will fail otherwise.
#
# Schema per entry:
#
#   - column: <table>.<col>           # always required
#     script: path/relative/to/repo   # canonical writer
#     write_function: name            # function inside the script (informational)
#     plists:                         # launchd plists that schedule the script
#       - com.openclaw.<name>
#     schedule: human-readable        # informational; "daily 06:00 PT", etc.
#     sla_hours: float                # SLO; should match freshness_contracts entry
#     required_for: [strategy ...]    # which strategies depend on this column
#     notes: free-text                # known issues, exemptions, history

writers:

# ─────────────────────────────────────────────────────────────────────────────
# CW indicator family — pipelines/insider_study/compute_cw_indicators.py
# refresh-features step 2/6, run daily 06:00 PT Mon–Fri.
# Also invoked by fetch_latest._run_indicators every 5 min (subprocess) with
# the same --since window. Writes freshness via _write_freshness_for_indicator.
# ─────────────────────────────────────────────────────────────────────────────

