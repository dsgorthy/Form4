# Per-column freshness contracts.
#
# Every analytical column the strategy runners filter on must have an entry.
# `framework/contracts/freshness.py:assert_fresh()` raises StaleSignalError
# if a column's last_computed_at exceeds the contract.
#
# Schema:
#   <table>.<column>:
#     max_staleness_hours: float    # hard SLO
#     required_for: [strategy ...]  # which strategies depend on this column
#                                   # use ['*'] to mean "all live strategies"
#     description: str              # human-readable; for runbook clarity
#     populated_by: str             # script/job that writes this column
#
# Contract review: 2026-05-08 (Phase 2 P0). Restored to original 26-30h
# values. Phase 1 (2026-05-02) created this file but the paired item
# ("compute pipelines write signal_freshness rows on completion") was
# never implemented, so the fallback path in freshness.py:get_freshness()
# always fired — and the fallback measured the wrong thing (MAX(filing_date)
# interpreted as midnight UTC, structurally always 24h+ behind wallclock).
#
# Phase 2 P0 fixes the primary path: every compute pipeline writes a
# signal_freshness row in the same transaction as its data write, atomic.
# The fallback is removed — `get_freshness()` raises FreshnessUnknownError
# if no signal_freshness row exists. The runner's meta-check distinguishes
# "data is stale" (per-column StaleSignalError) from "the freshness system
# itself is broken" (FreshnessSystemBrokenError, P0 alert).
#
# These SLAs assume the refresh-features chain runs daily ~09:30 PT and
# completes within minutes. 26h gives ~2h margin past the natural 24h
# cycle. Tighten further only after observing 30+ days of clean operation.

# ── Trade-level analytical columns (populated by compute_cw_indicators) ──
trades.dip_3mo:
  max_staleness_hours: 26
  required_for: [reversal_dip]
  description: "3-month price change vs trade_date close (PIT)"
  populated_by: pipelines/insider_study/compute_cw_indicators.py

trades.dip_1mo:
  max_staleness_hours: 26
  required_for: [reversal_dip]
  description: "1-month price change vs trade_date close (PIT)"
  populated_by: pipelines/insider_study/compute_cw_indicators.py

trades.above_sma50:
  max_staleness_hours: 26
  required_for: [quality_momentum]
  description: "Boolean: trade price above 50-day SMA at trade_date"
  populated_by: pipelines/insider_study/compute_cw_indicators.py

trades.above_sma200:
  max_staleness_hours: 26
  required_for: [quality_momentum]
  description: "Boolean: trade price above 200-day SMA at trade_date"
