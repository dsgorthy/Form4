trades.is_recurring:
  max_staleness_hours: 48
  required_for: ['*']
  description: "Boolean: insider buys this ticker on a regular schedule (heuristic)"
  populated_by: pipelines/insider_study/compute_cw_indicators.py

trades.is_tax_sale:
  max_staleness_hours: 48
  required_for: ['*']
  description: "Boolean: heuristic for tax-loss-harvest sales (Nov/Dec)"
  populated_by: pipelines/insider_study/compute_cw_indicators.py

trades.cohen_routine:
  max_staleness_hours: 48
  required_for: [reversal_dip]
  description: "Boolean: trade is part of routine plan per Cohen et al."
  populated_by: pipelines/insider_study/compute_cohen_pit.py

# trades.is_10b5_1: contract dropped 2026-05-17. Parse-time field from
# Form 4 XML set at INSERT in fetch_latest.py — no compute step, no
# canonical write_freshness writer. Strategies still read the column; its
# staleness piggybacks on trades.filing_date (same ingest writer, same plist),
# which IS contracted at 48h.

trades.is_rare_reversal:
  max_staleness_hours: 26
  required_for: [reversal_dip]
  description: "Boolean: insider broke ≥5-event same-direction streak with this opposite-direction trade (PIT)"
  populated_by: pipelines/insider_study/compute_switch_rate.py
  notes: "Was mislabeled as compute_cw_indicators.py until 2026-05-17 audit — compute_cw_indicators' INDICATOR_TO_COLUMNS['consecutive'] used to claim is_rare_reversal but never wrote it. RD silenced 8 weeks under that green-for-wrong-reasons contract."

trades.pit_cluster_size:
  max_staleness_hours: 26
  required_for: ['*']
  description: "Count of distinct other insiders filing same ticker+trans_code in prior 30 days (PIT)"
  populated_by: pipelines/insider_study/compute_pit_clusters.py

# ── Conviction-input columns (used by compute_conviction, not gating filters) ──
trades.is_largest_ever:
  max_staleness_hours: 48
  required_for: ['*']
  description: "Boolean: this buy is the largest ever for the (insider, ticker). Adds +0.5 to conviction score. Multi-lot Form 4 marks only one row=1."
  populated_by: pipelines/insider_study/compute_cw_indicators.py

# ── PIT scoring (populated by build_pit_scores) ──
trades.pit_grade:
  max_staleness_hours: 30
  required_for: [quality_momentum, reversal_dip, tenb51_surprise]
  description: "PIT-derived grade A+/A/B/C/D from insider_ticker_scores (V2 Bayesian scorer)"
  populated_by: pipelines/insider_study/backfill_pit_grades.py

trades.week52_proximity:
  max_staleness_hours: 48
  required_for: []  # informational — used by api/trade_grade.py and content pipelines, not strategy gating
  description: "Where current price sits in 52-week range: 0=at low, 1=at high. Input to api/trade_grade.py (+/-3 stars), breaking-signal scoring, daily-content gating."
  populated_by: pipelines/insider_study/compute_week52_proximity.py
  notes: "Was SQLite-only until 2026-05-17 PG port. 0% populated for April-May 2026 prior to fix."

trades.career_grade:
  max_staleness_hours: 30
  required_for: [quality_momentum]
  description: "PIT-derived grade A+/A/B/C/D from V3 career-track-record scorer (5y half-life vs V2's 1.5y). QM's primary admission filter."
  populated_by: pipelines/insider_study/compute_career_grades.py
  notes: "Added 2026-05-17. Was orphaned 2026-04-09 → 2026-05-16 — QM produced 0 candidates for 5 trading days because the V3 block lived only inside backfill_live.main() which insider-fetch doesn't invoke."

insider_ticker_scores.blended_score:
  max_staleness_hours: 30
  required_for: ['*']
  description: "Bayesian-shrinkage walk-forward PIT score per (insider, ticker, as_of_date)"
  populated_by: strategies/insider_catalog/build_pit_scores.py

# ── Raw ingest (populated by insider-fetch) ──
trades.filing_date:
  max_staleness_hours: 48
  required_for: ['*']
  description: "Latest filing_date in trades — proxy for ingest freshness. 48h covers quiet weekends where insider-fetch runs every 5min but inserts 0 rows; only write_freshness fires on n_rows>0."
  populated_by: strategies/insider_catalog/fetch_latest.py

# ── Compute_signals detectors (24 total; only strategy-critical contracted) ──
# Other detectors get signal_freshness rows from compute_signals.py:main() but
# no contract here — they're observability-only (visible in daily summary email,
# not gating any live strategy). Add a contract for any signal a strategy
# starts depending on via require_cluster, signal_type joins, etc.
trade_signals.top_trade:
  max_staleness_hours: 72
  required_for: ['*']
  description: "Top-trade flag joined by cw_runner when require_cluster: true (cw_runner.py:584). Compute_signals.top_trade detector, runs Mon-Fri 17:45 PT."
  populated_by: pipelines/insider_study/compute_signals.py

# ── Daily prices (populated by daily-prices) ──
prices.daily_prices.date:
  max_staleness_hours: 72
  required_for: ['*']
  description: "Latest date in prices.daily_prices for SPY (proxy for full coverage). 72h covers weekends."
  populated_by: pipelines/insider_study/update_daily_prices.py
