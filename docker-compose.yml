services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://host.docker.internal/form4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data/app_data:ro
      - ./pipelines/data:/data/runner:ro
      - ./strategies/cw_strategies/data:/data/cw_strategies:ro
    networks:
      - internal
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PRICE_ID: ${NEXT_PUBLIC_STRIPE_PRO_MONTHLY_PRICE_ID:-}
        NEXT_PUBLIC_STRIPE_PRO_YEARLY_PRICE_ID: ${NEXT_PUBLIC_STRIPE_PRO_YEARLY_PRICE_ID:-}
        NEXT_PUBLIC_STRIPE_API_MONTHLY_PRICE_ID: ${NEXT_PUBLIC_STRIPE_API_MONTHLY_PRICE_ID:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    env_file: .env
    environment:
      - API_URL_INTERNAL=http://api:8000/api/v1
    networks:
      - internal
    expose:
      - "3000"

networks:
  internal:
    driver: bridge
